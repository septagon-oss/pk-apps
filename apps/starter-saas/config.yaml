app_name: "starter-saas"
app_version: "0.3.1"
environment: "development"

http:
  addr: "127.0.0.1:8080"
  read_timeout: "30s"
  write_timeout: "30s"
  shutdown_timeout: "30s"

database:
  driver: "sqlite"
  dsn: "file:./pk.db?_pragma=busy_timeout(5000)&cache=shared&mode=rwc"

cache:
  provider: "memory"
